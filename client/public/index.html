<!DOCTYPE html>
<html>
<head lang="pt-br">
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Game</title>
    <link rel="stylesheet" href="./css/main.css" type="text/css" media="all" />
</head>
<body>
    <header>
        <div>Dinheiro: R$ <span id="money">0</span></div>
    </header>
    
    <section>
        <div id="click"></div>
    </section>
    
    <section id="store">
        <button class="sell_button sell" id="sell_button">Vender</button>
        <br>
        <button class="buy_button auto_click" id="buy_auto_click"> Auto Clicker R$100</button>
        <button class="buy_all_button auto_click" id="buy_all_auto_click">Comprar todos</button>
        <br>
        <button class="buy_button multiplier" id="buy_multiplier"> Multiplicador R$1000</button>
        <!--<button class="buy_all_button multiplier">Comprar todos</button>-->
    </section>
    
    <footer>
        <p>Feito por Kevin</p>
        
        <button id="reset">Resetar</button>
    </footer>
    
    <script src="./scripts/main.js"></script>
</body>
</html>
